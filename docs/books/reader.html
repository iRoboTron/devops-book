<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DevOps Course Reader</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.0/github-markdown-light.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f8fa; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar {
            width: 280px;
            min-width: 160px;
            max-width: 520px;
            height: 100vh;
            background: #fff;
            border-right: 1px solid #d0d7de;
            overflow-y: auto;
            padding: 10px 0;
            flex-shrink: 0;
            transition: width 0.2s ease, padding 0.2s ease;
            position: relative;
        }
        #sidebar.collapsed {
            width: 0 !important;
            min-width: 0;
            padding: 0;
            overflow: hidden;
            border-right: none;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px 10px;
            border-bottom: 1px solid #d0d7de;
            margin-bottom: 6px;
        }
        .sidebar-header h2 { font-size: 14px; color: #1f2328; flex: 1; white-space: nowrap; overflow: hidden; }
        #courseSelect {
            width: calc(100% - 20px);
            margin: 0 10px 6px;
            padding: 5px 7px;
            border: 1px solid #d0d7de;
            border-radius: 5px;
            font-size: 12px;
        }
        #fileCount { font-size: 11px; color: #656d76; padding: 0 10px 5px; }
        .ch-list { list-style: none; }
        .ch-list li {
            padding: 5px 10px;
            font-size: 13px;
            cursor: pointer;
            color: #1f2328;
            border-left: 3px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ch-list li:hover { background: #f6f8fa; color: #0969da; }
        .ch-list li.active { background: #ddf4ff; color: #0969da; border-left-color: #0969da; font-weight: 600; }
        .ch-group { padding: 6px 10px 2px; font-size: 10px; font-weight: 600; color: #656d76; text-transform: uppercase; }

        /* Resize handle */
        #resizer {
            width: 5px;
            cursor: col-resize;
            background: transparent;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }
        #resizer:hover, #resizer.dragging { background: #0969da; }
        #sidebar.collapsed + #resizer { display: none; }

        /* Toggle button */
        #toggleBtn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 200;
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 5px 9px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            color: #1f2328;
            box-shadow: 0 1px 3px rgba(0,0,0,.1);
            transition: left 0.2s ease;
        }
        #toggleBtn:hover { background: #f6f8fa; }

        /* Main content */
        #main {
            flex: 1;
            min-width: 0;
            height: 100vh;
            overflow-y: auto;
            padding: 28px 40px 60px;
        }
        .markdown-body { font-size: 15px; line-height: 1.7; max-width: 820px; }

        /* Loading / error states */
        #loadingMsg { padding: 60px 40px; color: #656d76; font-size: 15px; }
        .error-msg { color: #cf222e; background: #fff5f5; border: 1px solid #ffd7d7; padding: 12px 16px; border-radius: 6px; margin: 20px 0; }

        /* Scrollbars */
        #sidebar::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-thumb { background: #d0d7de; border-radius: 2px; }

        /* ── Code overrides ─────────────────────────────────────────────── */

        /* Инлайн-код */
        .markdown-body code:not(pre code) {
            background: #e8f0fe;
            color: #1a56a0;
            border: 1px solid #c5d8f8;
            border-radius: 4px;
            padding: 1px 5px;
            font-size: 0.88em;
        }

        /* Блок кода — тёмный фон (в тему с github-dark highlight) */
        .markdown-body pre {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 42px 20px 16px;
            overflow-x: auto;
            margin: 14px 0;
            position: relative;
        }
        .markdown-body pre code {
            background: transparent;
            color: #e6edf3;
            border: none;
            padding: 0;
            font-size: 13.5px;
            line-height: 1.6;
        }
        .code-copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #21262d;
            color: #c9d1d9;
            padding: 5px 10px;
            font-size: 12px;
            line-height: 1.2;
            cursor: pointer;
            transition: background .15s ease, color .15s ease, border-color .15s ease;
        }
        .code-copy-btn:hover {
            background: #30363d;
            color: #fff;
            border-color: #8b949e;
        }
        .code-copy-btn.copied {
            background: #238636;
            color: #fff;
            border-color: #2ea043;
        }
        .code-copy-btn.failed {
            background: #da3633;
            color: #fff;
            border-color: #f85149;
        }

        /* Цитата (blockquote) */
        .markdown-body blockquote {
            background: #fff8e6;
            border-left: 4px solid #f0a830;
            border-radius: 0 6px 6px 0;
            padding: 10px 16px;
            color: #4a3800;
            margin: 14px 0;
        }
        .markdown-body blockquote p { margin: 0; }
    </style>
</head>
<body>

<button id="toggleBtn" title="Скрыть/показать меню">☰</button>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>📚 DevOps Course</h2>
    </div>
    <select id="courseSelect"></select>
    <div id="fileCount"></div>
    <ul class="ch-list" id="chList"></ul>
</nav>

<div id="resizer"></div>

<div id="main">
    <div id="loadingMsg">Загружаю список файлов…</div>
    <div id="content" class="markdown-body"></div>
</div>

<script>
marked.setOptions({
    highlight: (code, lang) => lang && hljs.getLanguage(lang)
        ? hljs.highlight(code, { language: lang }).value
        : hljs.highlightAuto(code).value,
    breaks: true, gfm: true
});

const COURSE_NAMES = {
    "linux-for-devops":           "1: Linux",
    "nginx-https-devops":         "2: Сеть / Nginx",
    "docker-devops":              "3: Docker",
    "cicd-devops":                "4: CI/CD",
    "infrastructure-devops":      "5: Инфраструктура",
    "security-monitoring-devops": "6: Безопасность",
    "final-project":              "7: Финальный проект",
};

const COURSE_ALIASES = {
    "1": "linux-for-devops",
    "linux": "linux-for-devops",
    "2": "nginx-https-devops",
    "net": "nginx-https-devops",
    "network": "nginx-https-devops",
    "nginx": "nginx-https-devops",
    "3": "docker-devops",
    "docker": "docker-devops",
    "4": "cicd-devops",
    "ci": "cicd-devops",
    "cicd": "cicd-devops",
    "5": "infrastructure-devops",
    "infra": "infrastructure-devops",
    "6": "security-monitoring-devops",
    "security": "security-monitoring-devops",
    "7": "final-project",
    "final": "final-project"
};

const sidebar    = document.getElementById('sidebar');
const toggleBtn  = document.getElementById('toggleBtn');
const resizer    = document.getElementById('resizer');
const courseSel  = document.getElementById('courseSelect');
const chListEl   = document.getElementById('chList');
const contentEl  = document.getElementById('content');
const fileCountEl= document.getElementById('fileCount');
const loadingMsg = document.getElementById('loadingMsg');

// ── Collapse / expand ──────────────────────────────────────────────────────
let collapsed = false;
toggleBtn.addEventListener('click', () => {
    collapsed = !collapsed;
    sidebar.classList.toggle('collapsed', collapsed);
    toggleBtn.style.left = collapsed ? '10px' : (sidebar.offsetWidth + 14) + 'px';
});
function updateTogglePos() {
    if (!collapsed) toggleBtn.style.left = (sidebar.offsetWidth + 14) + 'px';
}
updateTogglePos();

// ── Resize ─────────────────────────────────────────────────────────────────
let startX, startW;
resizer.addEventListener('mousedown', e => {
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    resizer.classList.add('dragging');
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
    e.preventDefault();
});
function onDrag(e) {
    const newW = Math.min(520, Math.max(160, startW + e.clientX - startX));
    sidebar.style.width = newW + 'px';
    updateTogglePos();
}
function stopDrag() {
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
}

// ── Data ───────────────────────────────────────────────────────────────────
let courses = {};   // { courseName: [filenames] }
const cache = {};   // { "course/file": text }
let currentCourse = null;
let currentFile = null;

function itemFile(item) { return typeof item === 'string' ? item : item.file; }
function itemLabel(item) {
    if (typeof item === 'string') {
        return item.replace(/\.md$/, '').replace(/[-_]/g, ' ')
                   .replace(/\b\w/g, c => c.toUpperCase());
    }
    return item.title || itemFile(item).replace(/\.md$/, '').replace(/[-_]/g, ' ')
                                        .replace(/\b\w/g, c => c.toUpperCase());
}

function groupFiles(items) {
    const groups = {};
    for (const item of items) {
        const fn = itemFile(item);
        let g;
        if (fn.startsWith('chapter-')) {
            const n = parseInt(fn.match(/\d+/)?.[0] || '0');
            g = n <= 3 ? 'Подготовка' : n <= 6 ? 'Часть 1' : n <= 9 ? 'Часть 2' : 'Часть 3';
        } else if (fn.startsWith('appendix')) { g = 'Приложения';
        } else if (fn === 'book.md')           { g = 'Обзор';
        } else                                  { g = 'Другое'; }
        if (!groups[g]) groups[g] = [];
        groups[g].push(item);
    }
    return groups;
}

function sortedCourseKeys() {
    return Object.keys(courses).sort((a, b) => {
        const oa = Object.keys(COURSE_NAMES).indexOf(a);
        const ob = Object.keys(COURSE_NAMES).indexOf(b);
        return (oa === -1 ? 999 : oa) - (ob === -1 ? 999 : ob);
    });
}

function courseParamFor(key) {
    const idx = sortedCourseKeys().indexOf(key);
    return idx >= 0 ? String(idx + 1) : key;
}

function fileParamFor(filename) {
    if (filename === 'book.md') return 'book';
    const chapter = filename.match(/^chapter-(\d+)\.md$/);
    if (chapter) return String(parseInt(chapter[1], 10));
    const appendix = filename.match(/^appendix-([a-z])\.md$/i);
    if (appendix) return appendix[1].toLowerCase();
    return filename.replace(/\.md$/, '');
}

function resolveCourseParam(raw) {
    const keys = sortedCourseKeys();
    if (!keys.length) return null;
    if (!raw) return keys[0];

    const value = String(raw).trim().toLowerCase();
    if (courses[value]) return value;
    if (COURSE_ALIASES[value] && courses[COURSE_ALIASES[value]]) return COURSE_ALIASES[value];

    const numeric = Number(value);
    if (Number.isInteger(numeric) && numeric >= 1 && numeric <= keys.length) {
        return keys[numeric - 1];
    }

    return keys[0];
}

function resolveFileParam(course, raw) {
    const items = courses[course] || [];
    const files = items.map(itemFile);
    if (!files.length) return null;
    if (!raw) return files[0];

    const value = String(raw).trim().toLowerCase();
    const exact = files.find(fn => fn.toLowerCase() === value || fn.toLowerCase() === value + '.md');
    if (exact) return exact;
    if (value === 'book') return files.includes('book.md') ? 'book.md' : files[0];

    const chapterMatch = value.match(/^c?(?:hapter-)?0*(\d+)$/);
    if (chapterMatch) {
        const n = chapterMatch[1].padStart(2, '0');
        const chapter = files.find(fn => fn === `chapter-${n}.md`);
        if (chapter) return chapter;
    }

    const appendixMatch = value.match(/^(?:a|app|appendix-)?([a-z])$/);
    if (appendixMatch) {
        const appendix = files.find(fn => fn.toLowerCase() === `appendix-${appendixMatch[1]}.md`);
        if (appendix) return appendix;
    }

    const slug = files.find(fn => fn.replace(/\.md$/, '').toLowerCase() === value);
    return slug || files[0];
}

function readRoute() {
    const params = new URLSearchParams(window.location.search);
    const course = resolveCourseParam(params.get('b') || params.get('book'));
    const file = course ? resolveFileParam(course, params.get('c') || params.get('chapter')) : null;
    return { course, file };
}

function updateUrl(course, filename, replace = false) {
    if (!course || !filename) return;
    const next = new URL(window.location.href);
    next.search = '';
    next.searchParams.set('b', courseParamFor(course));
    next.searchParams.set('c', fileParamFor(filename));
    if (next.href === window.location.href) return;
    history[replace ? 'replaceState' : 'pushState']({ course, filename }, '', next);
}

// ── Load file list (static JSON generated by generate_filelist.py) ─────────
async function init() {
    try {
        const r = await fetch('files.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        courses = data.courses || {};
        if (Object.keys(courses).length === 0) throw new Error('Нет файлов');
        buildSidebar(readRoute(), true);
        loadingMsg.style.display = 'none';
    } catch(err) {
        loadingMsg.innerHTML = '<div class="error-msg">Ошибка загрузки: ' + err.message + '</div>';
    }
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function buildSidebar(route = {}, replaceUrl = false) {
    const sortedKeys = sortedCourseKeys();
    courseSel.innerHTML = '';
    for (const key of sortedKeys) {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = COURSE_NAMES[key] || key;
        courseSel.appendChild(opt);
    }
    if (sortedKeys.length) loadCourse(route.course || sortedKeys[0], route.file, { replaceUrl });
}

function loadCourse(key, preferredFile = null, options = {}) {
    const fns = courses[key] || [];
    const groups = groupFiles(fns);
    courseSel.value = key;
    chListEl.innerHTML = '';
    for (const [gname, gfns] of Object.entries(groups)) {
        if (gfns.length > 1 || gname !== 'Другое') {
            const d = document.createElement('div');
            d.className = 'ch-group'; d.textContent = gname;
            chListEl.appendChild(d);
        }
        for (const item of gfns) {
            const fn = itemFile(item);
            const li = document.createElement('li');
            li.textContent = itemLabel(item); li.title = fn;
            li.onclick = () => loadChapter(key, fn);
            chListEl.appendChild(li);
        }
    }
    fileCountEl.textContent = fns.length + ' файлов';
    if (fns.length) {
        const files = fns.map(itemFile);
        const filename = preferredFile && files.includes(preferredFile) ? preferredFile : itemFile(fns[0]);
        loadChapter(key, filename, options);
    }
}

// ── Chapter loader ─────────────────────────────────────────────────────────
async function loadChapter(course, filename, options = {}) {
    currentCourse = course;
    currentFile = filename;
    if (options.updateUrl !== false) updateUrl(course, filename, Boolean(options.replaceUrl));

    chListEl.querySelectorAll('li').forEach(li =>
        li.classList.toggle('active', li.title === filename));

    const key = course + '/' + filename;
    if (cache[key]) {
        renderContent(cache[key]);
        return;
    }

    contentEl.innerHTML = '<p style="color:#656d76">Загружаю…</p>';
    try {
        const r = await fetch('books/' + course + '/' + filename);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        cache[key] = await r.text();
        renderContent(cache[key]);
    } catch(err) {
        contentEl.innerHTML = '<div class="error-msg">Ошибка загрузки файла: ' + err.message + '</div>';
    }
}

function renderContent(text) {
    contentEl.innerHTML = marked.parse(text);
    document.getElementById('main').scrollTo(0, 0);
    contentEl.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
    enhanceCodeBlocks();
}

async function copyText(text) {
    if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
    }

    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.setAttribute('readonly', '');
    textarea.style.position = 'fixed';
    textarea.style.top = '-1000px';
    textarea.style.left = '-1000px';
    document.body.appendChild(textarea);
    textarea.select();

    try {
        if (!document.execCommand('copy')) throw new Error('copy failed');
    } finally {
        textarea.remove();
    }
}

function enhanceCodeBlocks() {
    contentEl.querySelectorAll('pre').forEach(pre => {
        const code = pre.querySelector('code');
        if (!code || pre.querySelector('.code-copy-btn')) return;

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'code-copy-btn';
        btn.textContent = 'Копировать';
        btn.setAttribute('aria-label', 'Скопировать код');
        btn.title = 'Скопировать код';

        btn.addEventListener('click', async () => {
            try {
                await copyText(code.textContent);
                btn.textContent = 'Скопировано';
                btn.classList.remove('failed');
                btn.classList.add('copied');
            } catch (err) {
                btn.textContent = 'Ошибка';
                btn.classList.remove('copied');
                btn.classList.add('failed');
            }
            setTimeout(() => {
                btn.textContent = 'Копировать';
                btn.classList.remove('copied', 'failed');
            }, 1600);
        });

        pre.appendChild(btn);
    });
}

courseSel.onchange = () => loadCourse(courseSel.value);

window.addEventListener('popstate', () => {
    const route = readRoute();
    loadCourse(route.course, route.file, { updateUrl: false });
});

init();
</script>
</body>
</html>
