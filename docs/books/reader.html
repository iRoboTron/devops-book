<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DevOps Course Reader</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.0/github-markdown-light.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f8fa; display: flex; min-height: 100vh; }
        #start { position: fixed; inset: 0; background: #f6f8fa; display: flex; align-items: center; justify-content: center; z-index: 100; }
        #start.hidden { display: none; }
        .start-box { background: #fff; border: 1px solid #d0d7de; border-radius: 12px; padding: 40px; text-align: center; max-width: 460px; }
        .start-box h1 { font-size: 22px; margin-bottom: 12px; }
        .start-box p { color: #656d76; margin-bottom: 20px; font-size: 14px; line-height: 1.5; }
        .start-box label { display: inline-block; background: #2da44e; color: #fff; padding: 10px 28px; border-radius: 6px; cursor: pointer; font-size: 15px; }
        .start-box label:hover { background: #2c974b; }
        #fileInput { display: none; }
        .sidebar { width: 280px; min-width: 280px; height: 100vh; position: sticky; top: 0; background: #fff; border-right: 1px solid #d0d7de; overflow-y: auto; padding: 12px 0; }
        .sidebar h2 { font-size: 15px; padding: 0 14px 10px; border-bottom: 1px solid #d0d7de; margin-bottom: 6px; color: #1f2328; }
        #courseSelect { width: calc(100% - 28px); margin: 0 14px 8px; padding: 5px 8px; border: 1px solid #d0d7de; border-radius: 5px; font-size: 13px; }
        #fileCount { font-size: 11px; color: #656d76; padding: 0 14px 6px; }
        .ch-list { list-style: none; }
        .ch-list li { padding: 5px 14px; font-size: 13px; cursor: pointer; color: #1f2328; border-left: 3px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ch-list li:hover { background: #f6f8fa; color: #0969da; }
        .ch-list li.active { background: #ddf4ff; color: #0969da; border-left-color: #0969da; font-weight: 600; }
        .ch-group { padding: 6px 14px 2px; font-size: 11px; font-weight: 600; color: #656d76; text-transform: uppercase; }
        .main { flex: 1; min-width: 0; padding: 28px 40px; max-width: 860px; }
        .markdown-body { font-size: 15px; line-height: 1.7; }
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: #d0d7de; border-radius: 3px; }
    </style>
</head>
<body>

<div id="start">
    <div class="start-box">
        <h1>📚 DevOps Course Reader</h1>
        <p>Выбери папку <code>books</code>. Все <code>.md</code> файлы загрузятся автоматически — без хардкода имён.</p>
        <label for="fileInput">📁 Выбрать папку books</label>
        <input type="file" id="fileInput" webkitdirectory multiple accept=".md">
    </div>
</div>

<nav class="sidebar" id="sidebar" style="display:none;">
    <h2>📚 DevOps Course</h2>
    <select id="courseSelect"></select>
    <div id="fileCount"></div>
    <ul class="ch-list" id="chList"></ul>
</nav>
<div class="main" id="main" style="display:none;">
    <div id="content" class="markdown-body"></div>
</div>

<script>
marked.setOptions({
    highlight: (code, lang) => lang && hljs.getLanguage(lang) ? hljs.highlight(code, { language: lang }).value : hljs.highlightAuto(code).value,
    breaks: true, gfm: true
});

// Названия курсов (только для отображения — файлы обнаруживаются АВТОМАТИЧЕСКИ)
const COURSE_NAMES = {
    "linux-for-devops": "1: Linux",
    "nginx-https-devops": "2: Сеть / Nginx",
    "docker-devops": "3: Docker",
    "cicd-devops": "4: CI/CD",
    "infrastructure-devops": "5: Инфраструктура",
    "security-monitoring-devops": "6: Безопасность",
    "final-project": "7: Финальный проект",
    "terraform-devops": "8: Terraform",
    "ansible-devops": "9: Ansible",
    "kubernetes-basics": "10: K8s основы",
    "kubernetes-advanced": "11: K8s Advanced",
    "monitoring-devops": "12: Мониторинг",
    "gitops-devops": "13: GitOps",
    "final-projects-2": "14: Финальные проекты",
};

// Хранение: ключ = "папка/файл" → текст
const files = {};
// Динамическая структура: курс → [файлы]
const courses = {};

// Красивое имя файла из имени файла
function prettyName(filename) {
    return filename
        .replace(/\.md$/, '')
        .replace(/[-_]/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
}

// Группировка файлов
function groupFiles(filenames) {
    const groups = {};
    for (const fn of filenames) {
        let group;
        if (fn.startsWith('chapter-')) {
            const num = parseInt(fn.match(/\d+/)?.[0] || '0');
            if (num <= 3) group = 'Подготовка';
            else if (num <= 6) group = 'Часть 1';
            else if (num <= 9) group = 'Часть 2';
            else group = 'Часть 3';
        } else if (fn.startsWith('appendix')) {
            group = 'Приложения';
        } else if (fn === 'book.md') {
            group = 'Обзор';
        } else {
            group = 'Другое';
        }
        if (!groups[group]) groups[group] = [];
        groups[group].push(fn);
    }
    return groups;
}

// Естественная сортировка
function naturalSort(a, b) {
    return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
}

document.getElementById('fileInput').addEventListener('change', async (e) => {
    for (const file of e.target.files) {
        if (!file.name.endsWith('.md')) continue;
        const parts = file.webkitRelativePath.split('/');
        // Найти папку курса (предпоследняя или выше)
        let folder = null;
        for (let i = parts.length - 2; i >= 0; i--) {
            if (COURSE_NAMES[parts[i]]) { folder = parts[i]; break; }
        }
        if (!folder) continue;
        const key = folder + '/' + file.name;
        try {
            files[key] = await file.text();
            if (!courses[folder]) courses[folder] = [];
            if (!courses[folder].includes(file.name)) {
                courses[folder].push(file.name);
            }
        } catch(err) {}
    }

    if (Object.keys(courses).length === 0) {
        alert('Не найдено .md файлов.\n\nВыбери папку которая содержит подпапки курсов:\nlinux-for-devops, docker-devops, и т.д.');
        return;
    }

    document.getElementById('start').classList.add('hidden');
    document.getElementById('sidebar').style.display = '';
    document.getElementById('main').style.display = '';
    buildSidebar();
});

const courseSel = document.getElementById('courseSelect');
const chListEl = document.getElementById('chList');
const contentEl = document.getElementById('content');
const fileCountEl = document.getElementById('fileCount');

function buildSidebar() {
    courseSel.innerHTML = '';
    let firstKey = null;
    // Сортируем курсы по порядку в COURSE_NAMES
    const sortedKeys = Object.keys(courses).sort((a, b) => {
        const orderA = Object.keys(COURSE_NAMES).indexOf(a);
        const orderB = Object.keys(COURSE_NAMES).indexOf(b);
        return (orderA === -1 ? 999 : orderA) - (orderB === -1 ? 999 : orderB);
    });

    for (const key of sortedKeys) {
        if (!firstKey) firstKey = key;
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = COURSE_NAMES[key] || key;
        courseSel.appendChild(opt);
    }
    if (firstKey) loadCourse(firstKey);
}

function loadCourse(key) {
    const filenames = courses[key].sort(naturalSort);
    const groups = groupFiles(filenames);

    chListEl.innerHTML = '';
    let totalFiles = 0;

    for (const [groupName, fns] of Object.entries(groups)) {
        if (fns.length > 1 || groupName !== 'Другое') {
            const d = document.createElement('div');
            d.className = 'ch-group';
            d.textContent = groupName;
            chListEl.appendChild(d);
        }
        for (const fn of fns) {
            totalFiles++;
            const li = document.createElement('li');
            li.textContent = prettyName(fn);
            li.title = fn;
            li.onclick = () => loadChapter(key, fn);
            chListEl.appendChild(li);
        }
    }

    fileCountEl.textContent = filenames.length + ' файлов';
    if (filenames.length > 0) loadChapter(key, filenames[0]);
}

function loadChapter(key, filename) {
    const text = files[key + '/' + filename];
    chListEl.querySelectorAll('li').forEach(li => {
        li.classList.toggle('active', li.title === filename);
    });
    contentEl.innerHTML = text ? marked.parse(text) : '<p style="color:#656d76">Файл не загружен.</p>';
    window.scrollTo(0, 0);
}

courseSel.onchange = () => loadCourse(courseSel.value);
</script>
</body>
</html>
