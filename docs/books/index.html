<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DevOps Course Reader</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.0/github-markdown-light.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f8fa; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar {
            width: 280px;
            min-width: 160px;
            max-width: 520px;
            height: 100vh;
            background: #fff;
            border-right: 1px solid #d0d7de;
            overflow-y: auto;
            padding: 10px 0;
            flex-shrink: 0;
            transition: width 0.2s ease, padding 0.2s ease;
            position: relative;
        }
        #sidebar.collapsed {
            width: 0 !important;
            min-width: 0;
            padding: 0;
            overflow: hidden;
            border-right: none;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px 10px;
            border-bottom: 1px solid #d0d7de;
            margin-bottom: 6px;
        }
        .sidebar-header h2 { font-size: 14px; color: #1f2328; flex: 1; white-space: nowrap; overflow: hidden; }
        #courseSelect {
            width: calc(100% - 20px);
            margin: 0 10px 6px;
            padding: 5px 7px;
            border: 1px solid #d0d7de;
            border-radius: 5px;
            font-size: 12px;
        }
        #fileCount { font-size: 11px; color: #656d76; padding: 0 10px 5px; }
        .ch-list { list-style: none; }
        .ch-list li {
            padding: 5px 10px;
            font-size: 13px;
            cursor: pointer;
            color: #1f2328;
            border-left: 3px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ch-list li:hover { background: #f6f8fa; color: #0969da; }
        .ch-list li.active { background: #ddf4ff; color: #0969da; border-left-color: #0969da; font-weight: 600; }
        .ch-group { padding: 6px 10px 2px; font-size: 10px; font-weight: 600; color: #656d76; text-transform: uppercase; }

        /* Resize handle */
        #resizer {
            width: 5px;
            cursor: col-resize;
            background: transparent;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }
        #resizer:hover, #resizer.dragging { background: #0969da; }
        #sidebar.collapsed + #resizer { display: none; }

        /* Toggle button */
        #toggleBtn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 200;
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 5px 9px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            color: #1f2328;
            box-shadow: 0 1px 3px rgba(0,0,0,.1);
            transition: left 0.2s ease;
        }
        #toggleBtn:hover { background: #f6f8fa; }

        /* Main content */
        #main {
            flex: 1;
            min-width: 0;
            height: 100vh;
            overflow-y: auto;
            padding: 28px 40px 60px;
        }
        .markdown-body { font-size: 15px; line-height: 1.7; max-width: 820px; }

        /* Loading / error states */
        #loadingMsg { padding: 60px 40px; color: #656d76; font-size: 15px; }
        .error-msg { color: #cf222e; background: #fff5f5; border: 1px solid #ffd7d7; padding: 12px 16px; border-radius: 6px; margin: 20px 0; }

        /* Scrollbars */
        #sidebar::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-thumb { background: #d0d7de; border-radius: 2px; }

        /* ── Code overrides ─────────────────────────────────────────────── */

        /* Инлайн-код */
        .markdown-body code:not(pre code) {
            background: #e8f0fe;
            color: #1a56a0;
            border: 1px solid #c5d8f8;
            border-radius: 4px;
            padding: 1px 5px;
            font-size: 0.88em;
        }

        /* Блок кода — тёмный фон (в тему с github-dark highlight) */
        .markdown-body pre {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px 20px;
            overflow-x: auto;
            margin: 14px 0;
        }
        .markdown-body pre code {
            background: transparent;
            color: #e6edf3;
            border: none;
            padding: 0;
            font-size: 13.5px;
            line-height: 1.6;
        }

        /* Цитата (blockquote) */
        .markdown-body blockquote {
            background: #fff8e6;
            border-left: 4px solid #f0a830;
            border-radius: 0 6px 6px 0;
            padding: 10px 16px;
            color: #4a3800;
            margin: 14px 0;
        }
        .markdown-body blockquote p { margin: 0; }
    </style>
</head>
<body>

<button id="toggleBtn" title="Скрыть/показать меню">☰</button>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>📚 DevOps Course</h2>
    </div>
    <select id="courseSelect"></select>
    <div id="fileCount"></div>
    <ul class="ch-list" id="chList"></ul>
</nav>

<div id="resizer"></div>

<div id="main">
    <div id="loadingMsg">Загружаю список файлов…</div>
    <div id="content" class="markdown-body"></div>
</div>

<script>
marked.setOptions({
    highlight: (code, lang) => lang && hljs.getLanguage(lang)
        ? hljs.highlight(code, { language: lang }).value
        : hljs.highlightAuto(code).value,
    breaks: true, gfm: true
});

const COURSE_NAMES = {
    "linux-for-devops":           "1: Linux",
    "nginx-https-devops":         "2: Сеть / Nginx",
    "docker-devops":              "3: Docker",
    "cicd-devops":                "4: CI/CD",
    "infrastructure-devops":      "5: Инфраструктура",
    "security-monitoring-devops": "6: Безопасность",
    "final-project":              "7: Финальный проект",
};

const sidebar    = document.getElementById('sidebar');
const toggleBtn  = document.getElementById('toggleBtn');
const resizer    = document.getElementById('resizer');
const courseSel  = document.getElementById('courseSelect');
const chListEl   = document.getElementById('chList');
const contentEl  = document.getElementById('content');
const fileCountEl= document.getElementById('fileCount');
const loadingMsg = document.getElementById('loadingMsg');

// ── Collapse / expand ──────────────────────────────────────────────────────
let collapsed = false;
toggleBtn.addEventListener('click', () => {
    collapsed = !collapsed;
    sidebar.classList.toggle('collapsed', collapsed);
    toggleBtn.style.left = collapsed ? '10px' : (sidebar.offsetWidth + 14) + 'px';
});
function updateTogglePos() {
    if (!collapsed) toggleBtn.style.left = (sidebar.offsetWidth + 14) + 'px';
}
updateTogglePos();

// ── Resize ─────────────────────────────────────────────────────────────────
let startX, startW;
resizer.addEventListener('mousedown', e => {
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    resizer.classList.add('dragging');
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
    e.preventDefault();
});
function onDrag(e) {
    const newW = Math.min(520, Math.max(160, startW + e.clientX - startX));
    sidebar.style.width = newW + 'px';
    updateTogglePos();
}
function stopDrag() {
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
}

// ── Data ───────────────────────────────────────────────────────────────────
let courses = {};   // { courseName: [filenames] }
const cache = {};   // { "course/file": text }

function prettyName(fn) {
    return fn.replace(/\.md$/, '').replace(/[-_]/g, ' ')
             .replace(/\b\w/g, c => c.toUpperCase());
}

function groupFiles(fns) {
    const groups = {};
    for (const fn of fns) {
        let g;
        if (fn.startsWith('chapter-')) {
            const n = parseInt(fn.match(/\d+/)?.[0] || '0');
            g = n <= 3 ? 'Подготовка' : n <= 6 ? 'Часть 1' : n <= 9 ? 'Часть 2' : 'Часть 3';
        } else if (fn.startsWith('appendix')) { g = 'Приложения';
        } else if (fn === 'book.md')           { g = 'Обзор';
        } else                                  { g = 'Другое'; }
        if (!groups[g]) groups[g] = [];
        groups[g].push(fn);
    }
    return groups;
}

// ── Load file list (static JSON generated by generate_filelist.py) ─────────
async function init() {
    try {
        const r = await fetch('files.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        courses = data.courses || {};
        if (Object.keys(courses).length === 0) throw new Error('Нет файлов');
        buildSidebar();
        loadingMsg.style.display = 'none';
    } catch(err) {
        loadingMsg.innerHTML = '<div class="error-msg">Ошибка загрузки: ' + err.message + '</div>';
    }
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function buildSidebar() {
    const sortedKeys = Object.keys(courses).sort((a, b) => {
        const oa = Object.keys(COURSE_NAMES).indexOf(a);
        const ob = Object.keys(COURSE_NAMES).indexOf(b);
        return (oa === -1 ? 999 : oa) - (ob === -1 ? 999 : ob);
    });
    courseSel.innerHTML = '';
    for (const key of sortedKeys) {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = COURSE_NAMES[key] || key;
        courseSel.appendChild(opt);
    }
    if (sortedKeys.length) loadCourse(sortedKeys[0]);
}

function loadCourse(key) {
    const fns = courses[key] || [];
    const groups = groupFiles(fns);
    chListEl.innerHTML = '';
    for (const [gname, gfns] of Object.entries(groups)) {
        if (gfns.length > 1 || gname !== 'Другое') {
            const d = document.createElement('div');
            d.className = 'ch-group'; d.textContent = gname;
            chListEl.appendChild(d);
        }
        for (const fn of gfns) {
            const li = document.createElement('li');
            li.textContent = prettyName(fn); li.title = fn;
            li.onclick = () => loadChapter(key, fn);
            chListEl.appendChild(li);
        }
    }
    fileCountEl.textContent = fns.length + ' файлов';
    if (fns.length) loadChapter(key, fns[0]);
}

// ── Chapter loader ─────────────────────────────────────────────────────────
async function loadChapter(course, filename) {
    chListEl.querySelectorAll('li').forEach(li =>
        li.classList.toggle('active', li.title === filename));

    const key = course + '/' + filename;
    if (cache[key]) {
        renderContent(cache[key]);
        return;
    }

    contentEl.innerHTML = '<p style="color:#656d76">Загружаю…</p>';
    try {
        const r = await fetch('books/' + course + '/' + filename);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        cache[key] = await r.text();
        renderContent(cache[key]);
    } catch(err) {
        contentEl.innerHTML = '<div class="error-msg">Ошибка загрузки файла: ' + err.message + '</div>';
    }
}

function renderContent(text) {
    contentEl.innerHTML = marked.parse(text);
    document.getElementById('main').scrollTo(0, 0);
    contentEl.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
}

courseSel.onchange = () => loadCourse(courseSel.value);

init();
</script>
</body>
</html>
